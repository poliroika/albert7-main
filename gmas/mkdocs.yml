site_name: gMAS Documentation
site_description: A modern graph-based framework for multi-agent systems
site_author: Frontier AI
copyright: Copyright &copy; 2026 Frontier AI

repo_url: https://github.com/frontier-ai-next/gmas
repo_name: frontier-ai-next/gmas

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_members_full_path: false
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Development Setup: getting-started/development.md
  - User Guide:
      - Key Concepts: user-guide/key-concepts.md
      - Core Components:
          - RoleGraph: user-guide/core/rolegraph.md
          - AgentProfile: user-guide/core/agent-profile.md
          - MACPRunner: user-guide/core/macp-runner.md
          - Scheduler: user-guide/core/scheduler.md
      - Memory System: user-guide/memory.md
      - Execution:
          - Running Agents: user-guide/execution/running.md
          - Streaming: user-guide/execution/streaming.md
          - Parallel Execution: user-guide/execution/parallel.md
      - Advanced:
          - Dynamic Topology: user-guide/advanced/dynamic-topology.md
          - Multi-Model Support: user-guide/advanced/multi-model.md
          - GNN Routing: user-guide/advanced/gnn-routing.md
          - Error Handling: user-guide/advanced/error-handling.md
      - Tools: user-guide/tools.md
      - Callbacks: user-guide/callbacks.md
  - API Reference:
      - Core: api/core.md
      - Execution: api/execution.md
      - Builder: api/builder.md
      - Tools: api/tools.md
      - Config: api/config.md
  - Examples:
      - Basic Usage: examples/basic-usage.md
      - Streaming: examples/streaming.md
      - GNN Routing: examples/gnn-routing.md
  - Contributing:
      - Overview: contributing/index.md
      - Development Workflow: contributing/workflow.md
      - Code Style: contributing/code-style.md
      - Testing: contributing/testing.md
