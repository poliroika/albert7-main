workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# =============================================================================
# Global Variables
# =============================================================================
variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  # GitLab CI creates a separate mountpoint for the build directory,
  # so we need to copy instead of using hard links
  UV_LINK_MODE: copy

  # Project paths
  PYTHONPATH: "$CI_PROJECT_DIR/src"

# =============================================================================
# Stages
# =============================================================================
stages:
  - validate
  - test
  - coverage
  - deploy
  - publish

# =============================================================================
# Templates
# =============================================================================

# Python version matrix anchor - update to add/remove Python versions
.matrix_python:
  parallel:
    matrix:
      - PY_VER: ["3.12", "3.13"]

# Base template with uv image and cache (from uv GitLab integration guide)
.uv_base:
  image: ghcr.io/astral-sh/uv:python${PY_VER}-trixie
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - ${UV_CACHE_DIR}
  after_script:
    - uv cache prune --ci

# =============================================================================
# Validation Stage
# =============================================================================

.validate_base:
  stage: validate
  extends:
    - .uv_base
    - .matrix_python
  before_script:
    - uv sync --group lint --group typecheck

validate:format-check:
  extends:
    - .validate_base
  script:
    - uv run ruff format --check src/ tests/ examples/ benchmarks/

validate:lint:
  extends:
    - .validate_base
  script:
    - uv run ruff check src/ tests/ examples/ benchmarks/

validate:typecheck:
  extends:
    - .validate_base
  script:
    - uv run ty check --ignore unresolved-import src/ examples/ benchmarks/ tests/ --output-format gitlab
  allow_failure: true

# =============================================================================
# Test Stage
# =============================================================================

.test_base:
  stage: test
  needs: []
  extends: .uv_base
  before_script:
    - uv sync --all-groups --all-extras

test:
  extends:
    - .test_base
    - .matrix_python
  script:
    - uv run tox -e test-py${PY_VER//.}
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .coverage.test-py${PY_VER//.}

# =============================================================================
# Coverage Stage
# =============================================================================

coverage:
  stage: coverage
  extends: .uv_base
  variables:
    PY_VER: "3.12"
  needs:
    - test
  dependencies:
    - test
  before_script:
    - uv sync --group test
  coverage: '/TOTAL.*?([\d.]+%)/'
  script:
    - uv run coverage combine
    - uv run coverage report --show-missing --fail-under=80
    - uv run coverage xml
    - uv run coverage html
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - htmlcov/
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# =============================================================================
# Deploy Stage
# =============================================================================

.deploy_base:
  stage: deploy
  extends: .uv_base
  image: ghcr.io/astral-sh/uv:python3.12-trixie

release:
  extends: .deploy_base
  script:
    - uv sync --group build
    - uv run semantic-release version
    - uv build
    - |
      if [ -n "$PYPI_TOKEN" ]; then
        uv run semantic-release publish
      fi
    - |
      if [ -n "$GIT_TOKEN" ]; then
        git config user.name "mag-sa"
        git config user.email "mag-sa@sberbank.ru"
        git push origin ${CI_COMMIT_BRANCH}
        git push origin --tags
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  extends: .deploy_base
  needs: []
  script:
    - uv sync --group docs
    - uv run mkdocs build
    - mv site public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  artifacts:
    paths:
      - public/
  pages:
    expire_in: 30 days

# =============================================================================
# Publish Stage
# =============================================================================

publish:main:
  stage: publish
  extends: .deploy_base
  needs:
    - release
  image: ghcr.io/astral-sh/uv:python3.12-trixie
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
  script:
    - uv build
    - uv publish --publish-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi --username "gitlab-ci-token" --password ${CI_JOB_TOKEN}
  allow_failure: true

publish:dev:
  stage: publish
  extends: .deploy_base
  image: ghcr.io/astral-sh/uv:python3.12-trixie
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - uv build
    - uv publish --publish-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi --username "gitlab-ci-token" --password ${CI_JOB_TOKEN}
  allow_failure: true
