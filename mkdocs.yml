  - Архитектура: architecture.md
  - Workspaces:
      - Обзор: workspaces.md
      - Создание workspace: creating-workspaces.md
  - Компоненты:
      - GMAS: gmas.md
      - Umbrella: umbrella-layer.md
      - Ouroboros: ouroboros.md
      - Meta-Harness (план): meta-harness-improvement-plan.md
      - Технический долг (harness): agent_harness_refactor_debt.md
  - Технический отчёт:
      - Оглавление: technical-report/README.md
      - "1. Цели и термины": technical-report/01-scope-terms.md
      - "2. Контекст системы": technical-report/02-system-context.md
      - "3. Топология репозитория": technical-report/03-repository-topology.md
      - "4. Артефакты .umbrella": technical-report/04-runtime-artifacts.md
      - "5. Слои и потоки": technical-report/05-architecture-flows.md
      - "6. Подсистемы Umbrella": technical-report/06-umbrella-subsystems.md
      - "7. Workspaces и политика": technical-report/07-workspaces-and-policy.md
      - "8. Ouroboros": technical-report/08-ouroboros-runtime.md
      - "9. Verification": technical-report/09-verification.md
      - "10. Web bridge": technical-report/10-web-bridge.md
      - "11. Конфигурация": technical-report/11-configuration.md
      - "12. Meta-Harness": technical-report/12-meta-harness.md
      - "13. Эксплуатация": technical-report/13-operations.md
      - "14. Тесты и документация": technical-report/14-testing-and-docs.md
      - "15. Task Planner": technical-report/15-task-planner.md
