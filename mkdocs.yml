# MkDocs → public/ for GitLab Pages. Locally: pip install mkdocs-material && mkdocs serve

site_name: Umbrella
site_description: Umbrella documentation and technical report
docs_dir: docs
site_dir: public

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/gitlab
    logo: material/robot
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - announce.dismiss

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.smartsymbols

nav:
  - Home: README.md
  - Architecture: architecture.md
  - Workspaces:
      - Overview: workspaces.md
      - Creating workspaces: creating-workspaces.md
  - Components:
      - GMAS: gmas.md
      - Umbrella: umbrella-layer.md
      - Ouroboros: ouroboros.md
  - Technical report:
      - Contents: technical-report/README.md
      - "1. Scope and terms": technical-report/01-scope-terms.md
      - "2. System context": technical-report/02-system-context.md
      - "3. Repository topology": technical-report/03-repository-topology.md
      - "4. Runtime artifacts": technical-report/04-runtime-artifacts.md
      - "5. Architecture flows": technical-report/05-architecture-flows.md
      - "6. Umbrella subsystems": technical-report/06-umbrella-subsystems.md
      - "7. Workspaces and policy": technical-report/07-workspaces-and-policy.md
      - "8. Ouroboros runtime": technical-report/08-ouroboros-runtime.md
      - "9. Verification": technical-report/09-verification.md
      - "10. Web bridge": technical-report/10-web-bridge.md
      - "11. Configuration": technical-report/11-configuration.md
      - "12. Harness vs meta-harness": technical-report/12-meta-harness.md
      - "13. Operations": technical-report/13-operations.md
      - "14. Testing and docs": technical-report/14-testing-and-docs.md
      - "15. Task planner": technical-report/15-task-planner.md
