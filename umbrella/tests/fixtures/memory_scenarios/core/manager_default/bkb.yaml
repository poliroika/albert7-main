rules:
  - id: manager_test_rule
    title: Manager verified rule for harness
    scope: manager
    type: behavior
    status: active
    trust: verified
    applies_to:
      phases: ["*"]
      workspaces: ["*"]
      agents: ["*"]
    rule:
      behavior: cite ledger events for durable promotion
  - id: platform_diff_hash_exit_context
    title: Phase exit must validate completion diff against changed_files
    scope: manager
    type: anti_pattern
    status: active
    trust: verified
    applies_to:
      phases: ["execute", "plan", "plan_review", "verify", "final_review"]
      workspaces: ["*"]
      agents: ["*"]
    rule:
      trigger: phase exit contract validation after mark_subtask_complete
      forbidden: Treating an empty workspace diff context as proof that completion evidence is stale.
      behavior: >-
        Umbrella aligns phase-exit contract checks with completion changed_files so
        a passing subtask proof is not rejected by a false diff_hash_mismatch.
  - id: platform_loop_back_superseded
    title: Supersede stale loop_back_to after subtask recovery
    scope: manager
    type: anti_pattern
    status: active
    trust: verified
    applies_to:
      phases: ["execute", "plan", "plan_review"]
      workspaces: ["*"]
      agents: ["*"]
    rule:
      trigger: phase completion routing after mark_subtask_complete or mutate_phase_plan
      forbidden: >-
        Honoring an earlier loop_back_to(plan) signal after project-setup was repaired
        and accepted with fresh proof.
      behavior: >-
        Contract-driven loop_back targets parsed from the phase exit decision take
        precedence; loop_back_to signals before the latest mark_subtask_complete or
        mutate_phase_plan are ignored for routing.
