rules:
  - id: platform_diff_hash_exit_context
    title: Phase exit must validate completion diff against changed_files
    scope: manager
    type: anti_pattern
    status: active
    trust: verified
    applies_to:
      phases: ["execute", "plan", "plan_review", "verify", "final_review"]
      workspaces: ["*"]
      agents: ["*"]
    rule:
      trigger: phase exit contract validation after mark_subtask_complete
      forbidden: Treating an empty workspace diff context as proof that completion evidence is stale.
      behavior: >-
        Umbrella aligns phase-exit contract checks with completion changed_files so
        a passing subtask proof is not rejected by a false diff_hash_mismatch.

  - id: platform_loop_back_superseded
    title: Supersede stale loop_back_to after subtask recovery
    scope: manager
    type: anti_pattern
    status: active
    trust: verified
    applies_to:
      phases: ["execute", "plan", "plan_review"]
      workspaces: ["*"]
      agents: ["*"]
    rule:
      trigger: phase completion routing after mark_subtask_complete or mutate_phase_plan
      forbidden: >-
        Honoring an earlier loop_back_to(plan) signal after project-setup was repaired
        and accepted with fresh proof.
      behavior: >-
        Contract-driven loop_back targets parsed from the phase exit decision take
        precedence; loop_back_to signals before the latest mark_subtask_complete or
        mutate_phase_plan are ignored for routing. The same supersession applies to
        contract exit and _phase_loop_back_target when a revise micro-review is stale,
        not only to loop_back_to signals.

  - id: platform_revise_review_superseded_on_passing_completion
    title: Supersede stale revise micro-review after passing subtask completion
    scope: manager
    type: anti_pattern
    status: active
    trust: verified
    applies_to:
      phases: ["execute", "subtask_review"]
      workspaces: ["*"]
      agents: ["*"]
    rule:
      trigger: phase exit contract validation after mark_subtask_complete
      forbidden: Blocking execute exit with a revise micro-review after the cited subtask has a newer passing completion.
      behavior: >-
        ContractCompiler and phase loop-back routing ignore revise/abort micro-reviews
        when the targeted subtask is done with a passing verification report recorded
        after that review.
