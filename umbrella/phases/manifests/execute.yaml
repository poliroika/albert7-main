id: execute
version: 1
description: "Execution phase: implement subtasks by applying patches, running tests, using terminals, and iterating until all subtasks pass."

prompt_files:
  system:
    - umbrella/prompts/phases/execute.system.md

allowed_tools:
  - apply_workspace_patch
  - replace_workspace_file
  - delete_workspace_file
  - shell
  - terminal_session
  - read_file
  - load_skill
  - list_files
  - repo_read
  - repo_list
  - run_workspace_verify
  - run_subtask_proof
  - bg_start
  - bg_status
  - bg_tail
  - bg_list
  - bg_kill
  - run_unit_tests
  - mutate_phase_plan
  - request_scope_change
  - mark_subtask_complete
  - request_watcher_review

forbidden_tools:
  - wipe_workspace
  - reset_palace

allowed_skills:
  - patch-discipline
  - terminal-debugging
  - error-self-repair
  - strict-verification-sync

memory:
  always_on:
    - {store: palace.charter, tier: always_on}
  hot:
    - {store: palace.run, tags: [phase_plan, plan_review_verdict, review_verdict, execution_error, patch_applied, execution_artifact]}
    - {store: palace.subtask, tags: [subtask_card, phase_plan_mutation, phase_retry, execution_failure]}
  warm_search:
    - {store: palace.lesson, n: 4}
    - {store: palace.codeptr, n: 2}
  write_rules:
    execution_artifact: {store: palace.run, tier: hot, scope: run_scoped}
    error_record: {store: palace.subtask, tier: hot, scope: subtask_scoped}

permissions:
  rules:
    - allow_tools: [apply_workspace_patch, delete_workspace_file, shell, terminal_session, read_file, load_skill, list_files, repo_read, repo_list, run_workspace_verify, run_subtask_proof, bg_start, bg_status, bg_tail, bg_list, bg_kill, run_unit_tests, mutate_phase_plan, request_scope_change, mark_subtask_complete, request_watcher_review]
    - deny_tools: [wipe_workspace, reset_palace]
    - deny_path: ["**/.env*", "**/secrets/**"]

exit_criteria:
  required_calls: [mark_subtask_complete]

mini_review_after: subtask_review

temp_tools_allowed: false

budgets:
  max_tokens: 60000
  max_seconds: 3600
  max_tool_calls: 500
