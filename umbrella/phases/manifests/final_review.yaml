id: final_review
version: 1
description: "Final review phase: holistic assessment of all completed subtasks against the workspace goal, running e2e tests and checking alignment."

prompt_files:
  system:
    - umbrella/prompts/phases/final_review.system.md

allowed_tools:
  - load_skill
  - read_file
  - list_files
  - palace_search
  - palace_link
  - run_workspace_verify
  - run_real_e2e
  - read_drive_log
  - read_terminal_scrollback
  - get_workspace_logs
  - loop_back_to
  - request_extra_subtask
  - submit_final_review

forbidden_tools:
  - apply_workspace_patch
  - shell
  - terminal_session
  - repo_write_commit
  - palace_add
  - claude_code_edit
  - sandbox_self_edit

allowed_skills:
  - e2e-test-author
  - goal-alignment-check
  - final-review-verification

memory:
  always_on:
    - {store: palace.charter, tier: always_on}
  hot:
    - {store: palace.run, tags: [phase_plan, execution_artifact, subtask_verdict, plan_review_verdict, final_review_report]}
    - {store: palace.subtask, tags: [subtask_card, subtask_complete, execution_artifact, execution_failure]}
  warm_search:
    - {store: palace.global, n: 6, filter: {type: lesson}}
  write_rules:
    final_review_report: {store: palace.run, tier: hot, scope: run_scoped}

permissions:
  rules:
    - allow_tools: [load_skill, read_file, list_files, palace_search, palace_link, run_workspace_verify, run_real_e2e, read_drive_log, read_terminal_scrollback, get_workspace_logs, loop_back_to, request_extra_subtask, submit_final_review]
    - deny_tools: [apply_workspace_patch, shell, terminal_session, repo_write_commit, palace_add, claude_code_edit, sandbox_self_edit]

exit_criteria:
  required_prior_calls: [run_workspace_verify, run_real_e2e]
  required_calls: [submit_final_review]

mini_review_after: null

budgets:
  max_tokens: 20000
  max_seconds: 600
