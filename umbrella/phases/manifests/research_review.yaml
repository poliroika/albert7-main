id: research_review
version: 1
description: "Mini-review gate after research: validate findings quality, coverage, and sufficiency before planning proceeds."

prompt_files:
  system:
    - umbrella/prompts/phases/research_review.system.md

allowed_tools:
  - read_file
  - list_files
  - read_workspace_charter
  - load_skill
  - palace_search
  - palace_link
  - get_gmas_context
  - search_gmas_knowledge
  - submit_micro_review
  - loop_back_to

forbidden_tools:
  - apply_workspace_patch
  - shell
  - terminal_session
  - repo_write_commit
  - palace_add

allowed_skills:
  - review-checklist

memory:
  always_on:
    - {store: palace.charter, tier: always_on}
  hot:
    - {store: palace.run, tags: [research_finding, research_summary]}
  warm_search: []
  write_rules:
    review_verdict: {store: palace.run, tier: hot, scope: phase_scoped}

permissions:
  rules:
    - allow_tools: [read_file, list_files, read_workspace_charter, load_skill, palace_search, palace_link, get_gmas_context, search_gmas_knowledge, submit_micro_review, loop_back_to]
    - deny_tools: [apply_workspace_patch, shell, terminal_session, repo_write_commit, palace_add]

exit_criteria:
  required_calls: [submit_micro_review]

mini_review_after: null

budgets:
  max_tokens: 10000
  max_seconds: 180
