id: preflight
version: 1
description: "Gate phase: verify environment readiness before any agent work."

prompt_files:
  system:
    - umbrella/prompts/phases/preflight.system.md

allowed_tools:
  - env_check
  - palace_health
  - mcp_health
  - skill_audit
  - read_workspace_charter
  - load_skill
  - submit_preflight_report
  - request_human_checkpoint

forbidden_tools:
  - apply_workspace_patch
  - shell
  - terminal_session
  - repo_write_commit
  - claude_code_edit
  - sandbox_self_edit
  - mcp_install

allowed_skills:
  - env-readiness
  - permission-envelope-author
  - human-checkpoint-author

memory:
  always_on:
    - {store: palace.charter, tier: always_on}
  hot:
    - {store: palace.run, tags: [preflight_incident]}
  warm_search: []
  write_rules:
    preflight_report: {store: palace.run, tier: hot, scope: run_scoped}

permissions:
  rules:
    - allow_tools: [env_check, palace_health, mcp_health, skill_audit, read_workspace_charter, load_skill, submit_preflight_report, request_human_checkpoint]
    - deny_tools: [apply_workspace_patch, shell, terminal_session, repo_write_commit, claude_code_edit, sandbox_self_edit]
    - deny_path: ["**/.env*", "**/secrets/**"]

exit_criteria:
  required_prior_calls: [env_check, palace_health, mcp_health, skill_audit, read_workspace_charter]
  required_calls: [submit_preflight_report]

mini_review_after: null

budgets:
  max_tokens: 5000
  max_seconds: 120
  max_tool_calls: 20
