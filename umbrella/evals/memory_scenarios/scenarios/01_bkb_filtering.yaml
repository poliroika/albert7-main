id: bkb_research_provenance_matrix
description: >
  Research injects active verified research BKB; verify skips research-only rule;
  candidate never injects.
workspace: test
mode: phase_prompt

env:
  UMBRELLA_ALLOW_VOLATILE_MEMORY_STUB: "1"

seed:
  workspace_fixture: default
  manager_fixture: manager_default

steps:
  - id: research_prompt
    action: build_phase_task
    phase: research
    run_id: run-scenario-1

  - id: verify_prompt
    action: build_phase_task
    phase: verify
    run_id: run-scenario-1

assert:
  research_prompt:
    prompt:
      contains_once:
        - "## [ALWAYS-LOADED MEMORY]"
      contains:
        - "source_id"
      not_contains:
        - "inject me please"
    bkb:
      included_ids:
        - test_active_provenance
      skipped_ids:
        - test_candidate_only

  verify_prompt:
    bkb:
      skipped_ids:
        - test_active_provenance
        - test_candidate_only
    prompt:
      not_contains:
        - "inject me please"
