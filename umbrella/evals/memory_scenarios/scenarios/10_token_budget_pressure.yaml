id: token_budget_pressure
description: Large proactive seed still produces valid overlay under budget.
workspace: test
mode: phase_prompt

env:
  UMBRELLA_PROACTIVE_MEMORY_BUDGET: "800"

seed:
  manager_core:
    identity: |
      # Identity
      Line one of identity.
      Line two of identity.
      Line three of identity.
      Line four of identity.
      Line five of identity.
      Line six of identity.
      Line seven of identity.
      Line eight of identity.
  workspace_core:
    charter: |
      # Charter
      Charter line one.
      Charter line two.
      Charter line three.
      Charter line four.
      Charter line five.

steps:
  - id: execute_prompt
    action: build_phase_task
    phase: execute
    run_id: run-budget-1

assert:
  execute_prompt:
    single_always_loaded: true
    contract:
      present: true
    overlay:
      max_tokens: 1000
      required_sections:
        - "Identity"
        - "BKB (verified"
