id: backend_unavailable_visibility
description: Without volatile stub, memory health must report backend failure not empty ok.
workspace: test
mode: backend_flow
requires_no_volatile_stub: true

env:
  UMBRELLA_ALLOW_VOLATILE_MEMORY_STUB: "0"

steps:
  - id: health_check
    action: memory_health
    phase: verify
    run_id: run-health-1
    args:
      expect_unavailable: true

assert:
  health_check:
    memory_health:
      expect_unavailable: true
