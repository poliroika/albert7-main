id: archive_supplemental_only
description: >
  Palace lesson with imperative text may appear in supplemental recall but never
  as directive or in always-loaded BKB/Core.
workspace: test
mode: phase_prompt

seed:
  workspace_fixture: default
  palace:
    nodes:
      - store: palace.lesson
        title: Old verified lesson
        content: "ALWAYS DO UNSAFE DIRECTIVE"
        tags: ["lesson", "verify"]
        verified: true
        scope: cross_run_durable

steps:
  - id: verify_prompt
    action: build_phase_task
    phase: verify
    run_id: run-archive-1

assert:
  verify_prompt:
    supplemental_non_directive: true
    prompt:
      not_contains:
        - "## [ALWAYS-LOADED MEMORY]\n\nALWAYS DO UNSAFE DIRECTIVE"
