id: durable_promotion_evidence
description: promote_to_durable blocked without valid evidence; succeeds with ledger ref.
workspace: test
mode: tool_flow

steps:
  - id: promote_no_evidence
    action: promote_to_durable
    phase: verify
    run_id: run-promo-1
    args:
      expect_saved: false
      evidence_refs: []

  - id: promote_fake_ledger
    action: promote_to_durable
    phase: verify
    run_id: run-promo-1
    args:
      expect_saved: false
      evidence_refs:
        - ref_type: ledger_event
          ref_id: fake-id
          hash: deadbeef
          produced_by: verifier

  - id: promote_valid
    action: promote_to_durable
    phase: verify
    run_id: run-promo-1
    args:
      append_ledger: true
      expect_saved: true

assert:
  promote_no_evidence:
    palace:
      no_new_store_nodes:
        - palace.durable

  promote_fake_ledger:
    palace:
      no_new_store_nodes:
        - palace.durable

  promote_valid:
    palace:
      new_store_nodes:
        palace.durable: 1
      contains_metadata:
        trust_level: public_verified
        evidence_refs_json_contains: ledger_event
