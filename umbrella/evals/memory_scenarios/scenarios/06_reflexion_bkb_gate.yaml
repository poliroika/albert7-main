id: reflexion_bkb_gate
description: Hindsight reflect queues candidate; BKB unchanged until accept gate.
workspace: test
mode: promotion_flow

env:
  UMBRELLA_HINDSIGHT_ENABLED: "1"
  UMBRELLA_HINDSIGHT_REFLECT_ENABLED: "1"

steps:
  - id: fake_reflect
    action: fake_hindsight_reflect
    phase: reflexion
    run_id: run-refl-1

assert:
  fake_reflect:
    bkb:
      unchanged: true
    proposal_queue:
      queued: 1
      accepted: 0
      files_exist:
        - "*.candidate.json"
      no_files:
        - "*.accepted.json"
