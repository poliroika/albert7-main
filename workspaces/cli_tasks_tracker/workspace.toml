[workspace]
id = "cli_tasks_tracker"
name = "CLI Tasks Tracker"
language = "python"

[verification]
skip_behavioral = true

[[verification.steps]]
kind = "shell"
name = "pytest:tests"
command = ["python", "-m", "pytest", "tests", "-q"]
optional = false

[[verification.steps]]
kind = "import_check"
name = "import main"
command = ["python", "-c", "import main"]
optional = false

[[verification.steps]]
kind = "import_check"
name = "python_compile_check"
command = ["python", "-m", "compileall", "-q", "."]
optional = false
