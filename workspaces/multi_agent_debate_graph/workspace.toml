[workspace]
id = "multi_agent_debate_graph"
name = "Multi-Agent Debate Graph (gMAS)"
language = "python"

[verification]
skip_behavioral = true

[[verification.steps]]
kind = "shell"
name = "pytest:tests"
command = ["python", "-m", "pytest", "tests", "-q"]
optional = false

[[verification.steps]]
kind = "import_check"
name = "python_compile_check"
command = ["python", "-m", "compileall", "-q", "."]
optional = false
